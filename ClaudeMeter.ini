[Rainmeter]
Update=1000
AccurateText=1
BackgroundMode=2
SolidColor=12,12,16,255
Group=ClaudeMeter
W=275
H=80

@include=#@#Credentials.inc

[Metadata]
Name=Claude Usage Meter
Author=arjkul
Version=2.5.0
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Information=Claude API usage tracker via OAuth token

[Variables]
ColorBackground=20,20,19
ColorText=230,230,235
ColorLabel=140,140,150
ColorAccent=217,119,87
ColorMedium=255,180,80
ColorBorder=40,40,50
ColorBarBg=30,30,40

[MeasureSession5hPct]
Measure=Script
ScriptFile=#@#ReadSession5h.lua
DynamicVariables=1

[MeasureWeekly7dPct]
Measure=Script
ScriptFile=#@#ReadWeekly7d.lua
DynamicVariables=1

[MeterBackground]
Meter=Shape
X=0
Y=0
W=275
H=80
Shape=Rectangle 0,0,275,80,6,6 | Fill Color #ColorBackground# | Stroke Color #ColorBorder#,1
LeftMouseUpAction=["https://claude.ai"]

[MeterTitle]
Meter=String
X=16
Y=6
W=243
H=16
FontFace=Poppins
FontSize=11
FontColor=#ColorAccent#
FontWeight=600
Text=Claude Usage
Alignment=Left

[MeterSession5hLabel]
Meter=String
X=16
Y=28
W=100
H=12
FontFace=Segoe UI
FontSize=8
FontColor=#ColorLabel#
FontWeight=400
Text=5-hour limit
Alignment=Left

[MeterSession5hBarBg]
Meter=Shape
X=16
Y=42
W=220
H=4
Shape=Rectangle 0,0,220,4,2,2 | Fill Color #ColorBarBg# | Stroke Color #ColorBorder#,0.5

[MeterSession5hBar]
Meter=Shape
X=16
Y=42
W=220
H=4
Shape=Rectangle 0,0,([MeasureSession5hPct:]/100)*220,4,2,2 | Fill Color #ColorAccent#
DynamicVariables=1

[MeterSession5hValue]
Meter=String
X=240
Y=28
W=35
H=12
FontFace=Segoe UI
FontSize=8
FontColor=#ColorText#
FontWeight=500
MeasureName=MeasureSession5hPct
Text=%1%
StringAlign=Right
DynamicVariables=1

[MeterWeekly7dLabel]
Meter=String
X=16
Y=54
W=100
H=12
FontFace=Segoe UI
FontSize=8
FontColor=#ColorLabel#
FontWeight=400
Text=Weekly limit
Alignment=Left

[MeterWeekly7dBarBg]
Meter=Shape
X=16
Y=68
W=220
H=4
Shape=Rectangle 0,0,220,4,2,2 | Fill Color #ColorBarBg# | Stroke Color #ColorBorder#,0.5

[MeterWeekly7dBar]
Meter=Shape
X=16
Y=68
W=220
H=4
Shape=Rectangle 0,0,([MeasureWeekly7dPct:]/100)*220,4,2,2 | Fill Color #ColorMedium#
DynamicVariables=1

[MeterWeekly7dValue]
Meter=String
X=240
Y=54
W=35
H=12
FontFace=Segoe UI
FontSize=8
FontColor=#ColorText#
MeasureName=MeasureWeekly7dPct
Text=%1%
StringAlign=Right
DynamicVariables=1

ContextTitle=Claude Usage Meter
ContextAction=ConfigRefresh
