[Rainmeter]
Update=1000
AccurateText=1
BackgroundMode=2
SolidColor=12,12,16,255
Group=ClaudeMeter
W=500
H=130

@include=#@#Credentials.inc

[Metadata]
Name=Claude Usage Meter
Author=arjkul
Version=2.6.0
License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0
Information=Claude API usage tracker via OAuth token

[Variables]
ColorBackground=20,20,19
ColorText=230,230,235
ColorLabel=140,140,150
ColorAccent=217,119,87
ColorMedium=255,180,80
ColorBorder=40,40,50
ColorBarBg=30,30,40
ColorAccentBg=217,119,87
ColorMediumBg=255,180,80

[MeasureSession5hPct]
Measure=Script
ScriptFile=#@#ReadSession5h.lua
DynamicVariables=1

[MeasureSession5hResetsIn]
Measure=Script
ScriptFile=#@#ReadSession5hResetsIn.lua
DynamicVariables=1

[MeasureSession5hResetTime]
Measure=Script
ScriptFile=#@#ReadSession5hResetTime.lua
DynamicVariables=1

[MeasureWeekly7dPct]
Measure=Script
ScriptFile=#@#ReadWeekly7d.lua
DynamicVariables=1

[MeasureWeekly7dResetsIn]
Measure=Script
ScriptFile=#@#ReadWeekly7dResetsIn.lua
DynamicVariables=1

[MeasureWeekly7dResetTime]
Measure=Script
ScriptFile=#@#ReadWeekly7dResetTime.lua
DynamicVariables=1

[MeasureSession5hResetTime]
Measure=Script
ScriptFile=#@#ReadSession5hResetTime.lua
DynamicVariables=1

[MeasureMax100]
Measure=Script
ScriptFile=#@#Read100.lua
DynamicVariables=1

[MeterBackground]
Meter=Shape
X=0
Y=0
W=500
H=130
Shape=Rectangle 0,0,500,130,6,6 | Fill Color #ColorBackground# | Stroke Color #ColorBorder#,1
LeftMouseUpAction=["https://claude.ai"]

[MeterTitle]
Meter=String
X=16
Y=8
W=288
H=16
FontFace=Poppins
FontSize=12
FontColor=#ColorAccent#
FontWeight=600
Text=Claude Usage
Alignment=Left

[MeterSession5hHeader]
Meter=String
X=16
Y=29
W=348
H=10
FontFace=Arial
FontSize=7
FontColor=#ColorLabel#
FontWeight=500
Text=CURRENT SESSION
Alignment=Left

[MeterSession5hLabel]
Meter=String
X=16
Y=37
W=100
H=12
FontFace=Segoe UI
FontSize=9
FontColor=#ColorText#
FontWeight=400
Text=5-hour limit
Alignment=Left

[MeterSession5hBarBg]
Meter=Shape
X=16
Y=51
W=220
H=5
Shape=Rectangle 0,0,220,5,2,2 | Fill Color #ColorBarBg# | Stroke Color #ColorBorder#,0.5

[MeterSession5hBar]
Meter=Shape
X=16
Y=51
W=220
H=5
Shape=Rectangle 0,0,([MeasureSession5hPct:]/100)*220,5,2,2 | Fill Color #ColorAccent#
DynamicVariables=1

[MeterSession5hValue]
Meter=String
X=244
Y=37
W=30
H=12
FontFace=Segoe UI
FontSize=10
FontColor=#ColorText#
FontWeight=600
MeasureName=MeasureSession5hPct
Text=%1%
StringAlign=Right
DynamicVariables=1

[MeterSession5hMaxCircle]
Meter=Shape
X=270
Y=25
W=32
H=32
Shape=Ellipse 16,16,12,12 | StrokeWidth 2 | Stroke Color 232,220,220,1 | Fill Color #ColorBorder#
AntiAlias=1

[MeterSession5hCircle]
Meter=Roundline
MeasureName=MeasureSession5hPct
X=270
Y=25
W=32
H=32
LineColor=#ColorAccent#
StartAngle=(Rad(270))
RotationAngle=(Rad(360))
LineStart=10
LineLength=12
Solid=1
AntiAlias=1
DynamicVariables=1
ValueRemainder=100


[MeterSession5hResetsIn]
Meter=String
X=310
Y=37
W=76
H=12
FontFace=Segoe UI
FontSize=8
FontColor=#ColorText#
FontWeight=400
MeasureName=MeasureSession5hResetsIn
Text=Resets in %1
StringAlign=Left
DynamicVariables=1

[MeterSession5hResetTime]
Meter=String
X=400
Y=37
W=100
H=12
FontFace=Arial
FontSize=8
FontColor=#ColorText#
FontWeight=400
MeasureName=MeasureSession5hResetTime
Text=%1
StringAlign=Left
DynamicVariables=1

[MeterWeekly7dHeader]
Meter=String
X=16
Y=70
W=348
H=10
FontFace=Segoe UI
FontSize=7
FontColor=#ColorLabel#
FontWeight=500
Text=WEEKLY LIMIT
Alignment=Left

[MeterWeekly7dLabel]
Meter=String
X=16
Y=82
W=100
H=12
FontFace=Segoe UI
FontSize=9
FontColor=#ColorText#
FontWeight=400
Text=All models
Alignment=Left

[MeterWeekly7dBarBg]
Meter=Shape
X=16
Y=96
W=220
H=5
Shape=Rectangle 0,0,220,5,2,2 | Fill Color #ColorBarBg# | Stroke Color #ColorBorder#,0.5

[MeterWeekly7dBar]
Meter=Shape
X=16
Y=96
W=220
H=5
Shape=Rectangle 0,0,([MeasureWeekly7dPct:]/100)*220,5,2,2 | Fill Color #ColorMedium#
DynamicVariables=1

[MeterWeekly7dValue]
Meter=String
X=244
Y=82
W=30
H=12
FontFace=Segoe UI
FontSize=10
FontColor=#ColorText#
FontWeight=600
MeasureName=MeasureWeekly7dPct
Text=%1%
StringAlign=Right
DynamicVariables=1

[MeterWeekly7dMaxCircle]
Meter=Shape
X=270
Y=70
W=32
H=32
Shape=Ellipse 16,16,12,12 | StrokeWidth 2 | Stroke Color 232,220,220,1 | Fill Color #ColorBorder#
AntiAlias=1


[MeterWeekly7dCircle]
Meter=Roundline
MeasureName=MeasureWeekly7dPct
X=270
Y=70
W=32
H=32
LineColor=#ColorMedium#
StartAngle=(Rad(270))
RotationAngle=(Rad(360))
LineStart=10
LineLength=12
Solid=1
AntiAlias=1
DynamicVariables=1
ValueRemainder=100

[MeterWeekly7dResetsIn]
Meter=String
X=310
Y=82
W=76
H=12
FontFace=Segoe UI
FontSize=8
FontColor=#ColorText#
FontWeight=400
MeasureName=MeasureWeekly7dResetsIn
Text=Resets in %1
StringAlign=Left
DynamicVariables=1

[MeterWeekly7dResetTime]
Meter=String
X=400
Y=82
W=100
H=12
FontFace=Arial
FontSize=8
FontColor=#ColorText#
FontWeight=400
MeasureName=MeasureWeekly7dResetTime
Text=%1
StringAlign=Left
DynamicVariables=1

ContextTitle=Claude Usage Meter
ContextAction=ConfigRefresh
